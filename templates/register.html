<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Inscription - NutriMoug</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="auth-container">

    <div class="auth-card register-card">

        <div class="auth-logo">

            <i class="fa-solid fa-leaf"></i>

            <h1>NutriMoug</h1>

        </div>

        <h2>Créer un compte</h2>

        <p>Configurez votre profil nutritionnel personnalisé</p>

        <form method="POST" class="auth-form">

            <div class="input-group">
                <input type="text" name="nom" placeholder="Nom complet" required>
            </div>

            <div class="input-group">
                <input type="email" name="email" placeholder="Adresse email" required>
            </div>

            <div class="input-group">
                <input type="password" name="password" placeholder="Mot de passe" required>
            </div>

            <div class="input-group">
                <input type="number" name="age" placeholder="Âge" required>
            </div>

            <div class="input-group">
                <select name="sexe" required>
                    <option value="">Sexe</option>
                    <option value="Homme">Homme</option>
                    <option value="Femme">Femme</option>
                </select>
            </div>

            <div class="input-group">
                <input type="number" name="taille" placeholder="Taille (cm)" required>
            </div>

            <div class="input-group">
                <input type="number" name="poids" placeholder="Poids (kg)" required>
            </div>

            <div class="input-group">
                <select name="activite" required>
                    <option value="">Niveau d'activité</option>
                    <option value="Faible">Faible</option>
                    <option value="Modéré">Modéré</option>
                    <option value="Élevé">Élevé</option>
                </select>
            </div>

            <div class="input-group">
                <select name="objectif" required>
                    <option value="">Objectif</option>
                    <option value="Perte de poids">Perte de poids</option>
                    <option value="Maintien">Maintien</option>
                    <option value="Prise de masse">Prise de masse</option>
                </select>
            </div>

            <div class="input-group">
                <input
                    type="text"
                    name="allergies"
                    placeholder="Allergies (facultatif)"
                >
            </div>

            <div class="input-group">
                <select name="preference_alimentaire">
                    <option value="Omnivore">Omnivore</option>
                    <option value="Halal">Halal</option>
                    <option value="Végétarien">Végétarien</option>
                    <option value="Vegan">Vegan</option>
                </select>
            </div>

            <button type="submit" class="auth-btn">
                Créer mon compte
            </button>

        </form>

        <div class="auth-footer">

            <p>
                Déjà inscrit ?
                <a href="/login">Se connecter</a>
            </p>

        </div>

    </div>

</div>

</body>

</html>
