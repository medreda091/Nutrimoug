<div class="tab-content" id="nutrition">

    <div class="section-card">

        <h2>Besoins nutritionnels</h2>

        <div class="info-grid">

            <div class="info-box">
                <h4>Calories</h4>
                <p>{{ calories }} kcal</p>
            </div>

            <div class="info-box">
                <h4>Protéines</h4>
                <p>{{ proteines }} g</p>
            </div>

            <div class="info-box">
                <h4>Glucides</h4>
                <p>{{ glucides }} g</p>
            </div>

            <div class="info-box">
                <h4>Lipides</h4>
                <p>{{ lipides }} g</p>
            </div>

            <div class="info-box">
                <h4>Eau</h4>
                <p>{{ eau }} L</p>
            </div>

        </div>

        <div class="conseil-box">

            <h3>Conseil nutritionnel</h3>

            <p>{{ conseil }}</p>

        </div>

    </div>

</div>
