<div class="tab-content" id="poids">

    <div class="section-card">

        <h2>Suivi du poids 📈</h2>

        <form action="/ajouter-poids" method="POST" class="modern-form">

            <input
                type="hidden"
                name="user_id"
                value="{{ utilisateur.id }}"
            >

            <input
                type="number"
                step="0.1"
                name="poids"
                placeholder="Nouveau poids (kg)"
                required
            >

            <button type="submit">

                Ajouter un poids

            </button>

        </form>

    </div>

    <div class="section-card">

        <h2>Historique des pesées</h2>

        {% if historique %}

        <div class="table-container">

            <table>

                <thead>

                    <tr>

                        <th>Poids</th>
                        <th>Date</th>

                    </tr>

                </thead>

                <tbody>

                    {% for mesure in historique %}

                    <tr>

                        <td>{{ mesure.poids }} kg</td>

                        <td>{{ mesure.date_mesure }}</td>

                    </tr>

                    {% endfor %}

                </tbody>

            </table>

        </div>

        {% else %}

        <p>Aucune mesure enregistrée.</p>

        {% endif %}

    </div>

</div>
